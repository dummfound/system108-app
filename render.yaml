services:
  - type: web
    name: system108-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CACHE_TTL_SECONDS
        value: 900
      - key: WEB_APP_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
